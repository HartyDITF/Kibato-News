name: Kibato News

on:

  schedule:
    - cron: "*/15 * * * *"

  workflow_dispatch:


jobs:

  news:

    runs-on: ubuntu-latest


    steps:

    - uses: actions/checkout@v4


    - uses: actions/setup-node@v4
      with:
        node-version: 22


    - run: npm install


    - run: node index.js
      env:
        DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}


    - name: Save database

      run: |

        git config --global user.name "Kibato Bot"

        git config --global user.email "bot@github.com"

        git add sent.json

        git commit -m "Update news database" || true

        git push
